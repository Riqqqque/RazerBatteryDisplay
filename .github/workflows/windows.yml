name: Windows build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Stage setup exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\razer-battery-display.exe dist\RazerBatteryDisplaySetup.exe -Force

      - name: Upload setup exe
        uses: actions/upload-artifact@v4
        with:
          name: RazerBatteryDisplaySetup
          path: dist/RazerBatteryDisplaySetup.exe
